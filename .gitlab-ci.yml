# GitLab CI for git-lfs.
#
# Pipeline shape:
#   lint     -> rustfmt + clippy + cargo doc warnings
#   test     -> cargo test --workspace
#   package  -> just package (.deb / .rpm / tarballs / zips, 6 targets + source)
#   release  -> create GitLab release on tag, link package artifacts
#   deploy   -> mdbook -> GitLab Pages (master only)
#
# All Rust jobs run on Alpine + rustup; the toolchain pin in
# rust-toolchain.toml is picked up automatically on first invocation.

stages:
  - lint
  - test
  - package
  - release
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUSTUP_HOME: $CI_PROJECT_DIR/.rustup
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  # sccache caches per-rustc-invocation outputs in the shared
  # rustutils-cache S3 bucket on Hetzner. SCCACHE_BUCKET, _ENDPOINT,
  # and _REGION come from the rustutils group's CI variables;
  # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are protected, so only
  # protected refs (master + version tags) can write to the cache.
  # Unprotected branches fall through to anonymous reads (see .rust
  # before_script). No key prefix — common deps (serde, tokio, …) are
  # shared across rustutils projects.
  RUSTC_WRAPPER: sccache
  # Pinned versions of cargo-installed packaging tools. Bump to upgrade;
  # `cargo install --version` is a no-op when the cached install matches.
  CARGO_DEB_VERSION: "3.6.4"
  CARGO_GENERATE_RPM_VERSION: "0.20.0"
  ALPINE_VERSION: "3.23"

# Cache definitions, split by invalidation cadence. Composed per-job
# via YAML anchors below — extends:cache array merging is finicky in
# GitLab CI, anchors are unambiguous.
#
# - registry: downloaded crate sources + index. Invalidates on
#   Cargo.lock change. Small (~tens of MB), shared across all Rust jobs.
# - bin: cargo-installed binaries (cargo-deb, cargo-generate-rpm).
#   Invalidates on .gitlab-ci.yml change (where versions are pinned).
#   Only the package job needs these.
#
# target/ is deliberately not cached — sccache handles per-rustc cache
# hits across runs, which makes target/ reconstruction cheap. The 2GB
# upload was eating a full minute per job.
#
# .rustup is also not cached — rustup-init from apk + a fresh download
# of the stable toolchain is ~30-60s, on par with what cache restore
# would cost for ~300MB. Not worth the upload churn.
.cache-defs:
  cache:
    - &cache-registry
      key:
        files: [Cargo.lock]
      paths:
        - .cargo/registry/cache
        - .cargo/registry/index
    - &cache-bin
      key:
        files: [.gitlab-ci.yml]
      paths:
        - .cargo/bin
        - .cargo/.crates.toml
        - .cargo/.crates2.json

.rust:
  image: alpine:$ALPINE_VERSION
  cache:
    - *cache-registry
  before_script:
    - apk add --no-cache build-base bash git rustup sccache
    - rustup-init -y --default-toolchain none --no-modify-path
    - export PATH="$CARGO_HOME/bin:$PATH"
    # Read-only sccache fallback when the protected AWS credentials
    # are absent (i.e. on unprotected branches). NO_CREDENTIALS forces
    # anonymous mode — reads work against the public bucket, writes
    # silently fail. On protected refs, AWS_ACCESS_KEY_ID is set and
    # we leave it unset so sccache uses the credentials normally.
    - if [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then export SCCACHE_S3_NO_CREDENTIALS=true; fi
    - rustup show

lint:
  extends: .rust
  stage: lint
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --all --check
    - RUSTDOCFLAGS="-Dwarnings" cargo doc --no-deps --workspace
    - cargo clippy --workspace --all-targets -- -Dwarnings
    # sccache stats — must run inside script (not after_script) so we
    # query the same daemon cargo populated, not a freshly-spawned one.
    - sccache --show-stats || true

test:
  extends: .rust
  stage: test
  script:
    - cargo test --workspace
    - sccache --show-stats || true

package:
  extends: .rust
  stage: package
  # Override the .rust cache list to add the bin cache, which only
  # this job needs (cargo-deb, cargo-generate-rpm). YAML anchors keep
  # the registry entry in sync with the .rust default.
  cache:
    - *cache-registry
    - *cache-bin
  rules:
    # Auto on tags — feeds the release job.
    - if: $CI_COMMIT_TAG
      when: on_success
    # Manual button on branch pushes so you can verify packaging
    # without cutting a tag. allow_failure keeps the pipeline green
    # when nobody clicks.
    - when: manual
      allow_failure: true
  before_script:
    - !reference [.rust, before_script]
    - apk add --no-cache zig zstd just zip tar cargo-zigbuild
    - cargo install --locked --version "$CARGO_DEB_VERSION" cargo-deb
    - cargo install --locked --version "$CARGO_GENERATE_RPM_VERSION" cargo-generate-rpm
  script:
    - just package
    - sccache --show-stats || true
  artifacts:
    paths:
      - target/dist/
    # Linked from GitLab releases — keep them around indefinitely so
    # the release page's download links don't 404 after a month.
    expire_in: never

# Tag-only. Reads the matching CHANGELOG section, then walks
# target/dist/ to attach every artifact as a release asset link.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/
  needs:
    - job: package
      artifacts: true
  script:
    - apk add --no-cache bash gawk
    - |
      bash -c '
      set -euo pipefail

      version="${CI_COMMIT_TAG#v}"

      # Pull the [version] section out of CHANGELOG.md. Fail loudly if
      # missing — the release pipeline should not silently ship a release
      # with no notes.
      notes=$(awk -v ver="[$version]" "
        /^## / && \$2 == ver { found=1; next }
        /^## / && found { exit }
        found { print }
      " CHANGELOG.md)

      if [ -z "$notes" ]; then
        echo "ERROR: no CHANGELOG entry for $version" >&2
        exit 1
      fi

      # Asset URLs use the per-ref artifact endpoint, which resolves to
      # the latest job artifact for that tag — stable as long as the
      # package job artifacts do not expire.
      args=()
      for f in target/dist/*; do
        name=$(basename "$f")
        url="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${f}?job=package"
        args+=( --assets-link "{\"name\":\"$name\",\"url\":\"$url\"}" )
      done

      release-cli create \
        --name "Release $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "$notes" \
        "${args[@]}"
      '

pages:
  image: alpine
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - apk add mdbook
    - mdbook build
    - mv target/book public
  artifacts:
    paths:
      - public
